version: "3.9"
services:
  backend:
    build: ./backend
    volumes:
      - ./backend/db:/app/db
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    restart: always
